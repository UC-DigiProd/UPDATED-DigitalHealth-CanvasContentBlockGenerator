<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Block Generator</title>
    <style>
        :root {
            --primary: #027299;
            --bg: #f8f9fa;
            --text: #333;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            color: var(--text);
            background: var(--bg);
            line-height: 1.5;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 { color: var(--primary); margin-top: 0; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9em; }
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea { resize: vertical; min-height: 80px; }
        .list-input { min-height: 120px; white-space: pre; }
        
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: background 0.2s;
        }
        button:hover { background: #005f80; }
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        @media (max-width: 768px) {
            .grid-layout { grid-template-columns: 1fr; }
        }
        .output-section h2 { font-size: 1.2em; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
        #preview {
            border: 1px dashed #ccc;
            padding: 1rem;
            border-radius: 8px;
            background: white;
            min-height: 100px;
        }
        #preview a { color: #009fc2; font-weight: bold; } /* Simple preview style for links */
        #code-output {
            white-space: pre-wrap;
            font-family: monospace;
            background: #2d2d2d;
            color: #ccc;
            padding: 1rem;
            border-radius: 4px;
            font-size: 0.85em;
            overflow-x: auto;
            height: 250px;
        }
        .copy-btn {
            background: #404e65;
            margin-bottom: 0.5rem;
            font-size: 0.8em;
            padding: 0.5rem 1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Content Block Generator</h1>
    <p>Select a component and fill in the fields. <strong>You can paste rich text (with links) directly into the text boxes</strong>, and it will automatically convert to HTML.</p>

    <div class="form-group">
        <label for="block-type">Select Content Block Type</label>
        <select id="block-type">
            </select>
    </div>

    <div id="dynamic-inputs">
        </div>

    <div class="grid-layout">
        <div class="output-section">
            <h2>Visual Preview</h2>
            <div id="preview"></div>
        </div>
        <div class="output-section">
            <h2>HTML Output <button class="copy-btn" id="copy-btn">Copy to Clipboard</button></h2>
            <textarea id="code-output" readonly></textarea>
        </div>
    </div>
</div>

<script>
    const templates = {
        calloutH4: {
            name: "Callout box (<h4> variation)",
            fields: [
                { id: "title", label: "Callout Title", default: "Important Note", type: "input" },
                { id: "primary", label: "Primary Paragraph", default: "This is the primary text of the callout.", type: "textarea" },
                { id: "secondary", label: "Secondary Paragraph", default: "This is secondary text, or leave blank to omit.", type: "textarea" }
            ],
            render: (d) => `<div style="background-color: rgba(0, 159, 194, 0.08); border: 1px solid rgba(0, 159, 194, 0.2); border-radius: 8px; padding: 1.5em; margin: 1.5em 0;">
    <h4 style="margin-top: 0; margin-bottom: 0.5em; color: #027299; font-size: 1.25em;">${d.title}</h4>
    <p style="color: #404e65; margin: 0 0 1em 0; line-height: 1.6;">${d.primary}</p>
    ${d.secondary ? `<p style="color: #404e65; margin: 0; line-height: 1.6;">${d.secondary}</p>` : ''}
</div>`
        },
        calloutH3: {
            name: "Callout box (<h3> variation)",
            fields: [
                { id: "title", label: "Callout Title", default: "Major Notice", type: "input" },
                { id: "primary", label: "Primary Paragraph", default: "Primary emphasis text.", type: "textarea" },
                { id: "secondary", label: "Secondary Paragraph", default: "Secondary emphasis text.", type: "textarea" }
            ],
            render: (d) => `<div style="background-color: rgba(0, 159, 194, 0.08); border: 1px solid rgba(0, 159, 194, 0.2); border-radius: 8px; padding: 1.5em; margin: 1.5em 0;">
    <h3 style="margin-top: 0; margin-bottom: 0.5em; color: #027299; font-size: 1.25em;">${d.title}</h3>
    <p style="color: #404e65; margin: 0 0 1em 0; line-height: 1.6;">${d.primary}</p>
    ${d.secondary ? `<p style="color: #404e65; margin: 0; line-height: 1.6;">${d.secondary}</p>` : ''}
</div>`
        },
        blockquote: {
            name: "Blockquote",
            fields: [
                { id: "quote", label: "Exact Quote Text", default: "This is a direct quote from a source.", type: "textarea" }
            ],
            render: (d) => `<blockquote style="margin: 1.5em 0; padding: 1.2em 1.5em; border-left: 4px solid #009fc2; background-color: rgba(64, 78, 101, 0.03); border-radius: 0 8px 8px 0;">
    <p style="margin: 0; color: #404e65; font-style: italic; line-height: 1.6;">${d.quote}</p>
</blockquote>`
        },
        defOption1: {
            name: "Definition box (Option 1: <dt> Semantic)",
            fields: [
                { id: "term", label: "Term", default: "Semantic HTML", type: "input" },
                { id: "definition", label: "Definition", default: "The use of HTML markup to reinforce the semantics, or meaning, of the information.", type: "textarea" }
            ],
            render: (d) => `<dl style="border: 1px solid #027299; border-radius: 6px; overflow: hidden; margin: 1.5em 0; padding: 0; background-color: #ffffff; font-family: inherit;">
    <dt style="background-color: #027299; padding: 12px 16px; margin: 0; color: #ffffff; font-size: 1.1em;">${d.term}</dt>
    <dd style="padding: 16px; margin: 0; color: #404e65; line-height: 1.6;">${d.definition}</dd>
</dl>`
        },
        defOption2: {
            name: "Definition box (Option 2: ARIA Roles)",
            fields: [
                { id: "term", label: "Term", default: "ARIA", type: "input" },
                { id: "definition", label: "Definition", default: "Accessible Rich Internet Applications is a set of roles and attributes.", type: "textarea" }
            ],
            render: (d) => `<div style="border: 1px solid #027299; border-radius: 6px; overflow: hidden; margin: 1.5rem 0; background-color: #ffffff; font-family: inherit;">
    <div style="background-color: #027299; padding: 12px 16px;">
        <p style="margin: 0; color: #ffffff;"><strong role="term">${d.term}</strong> is defined as:</p>
    </div>
    <div style="padding: 16px;" role="definition">
        <p style="margin: 0; color: #404e65; line-height: 1.6;">${d.definition}</p>
    </div>
</div>`
        },
        accordion: {
            name: "Collapsible Accordion (2 Items)",
            fields: [
                { id: "t1", label: "Accordion 1 Title", default: "Section 1 Overview", type: "input" },
                { id: "c1", label: "Accordion 1 Content", default: "Details about section 1.", type: "textarea" },
                { id: "t2", label: "Accordion 2 Title", default: "Section 2 Features", type: "input" },
                { id: "c2Intro", label: "Accordion 2 Intro Text", default: "Here are the features:", type: "textarea" },
                { id: "c2List", label: "Accordion 2 List (One item per line)", default: "Feature A\nFeature B\nFeature C", type: "list" }
            ],
            render: (d) => {
                const listItems = d.c2List.split('\n').map(i => i.trim()).filter(i => i);
                let listHtml = listItems.map((item, idx) => 
                    `<li style="${idx === listItems.length - 1 ? 'color: #404e65;' : 'margin-bottom: 8px; color: #404e65;'}">${item}</li>`
                ).join('\n                ');

                return `<div style="display: flex; flex-direction: column; gap: 12px; margin: 1.5em 0;">
    <details style="border: 1px solid rgba(64, 78, 101, 0.15); border-left: 4px solid #027299; border-radius: 6px; background: #ffffff;">
        <summary style="cursor: pointer; padding: 16px; font-size: 1.1em; color: #027299;"><strong>${d.t1}</strong></summary>
        <div style="padding: 0 16px 16px 16px;">
            <p style="margin: 0; color: #404e65; line-height: 1.6;">${d.c1}</p>
        </div>
    </details>
    <details style="border: 1px solid rgba(64, 78, 101, 0.15); border-left: 4px solid #027299; border-radius: 6px; background: #ffffff;">
        <summary style="cursor: pointer; padding: 16px; font-size: 1.1em; color: #027299;"><strong>${d.t2}</strong></summary>
        <div style="padding: 0 16px 16px 16px;">
            <p style="margin-top: 0; margin-bottom: 12px; color: #404e65; line-height: 1.6;">${d.c2Intro}</p>
            <ul style="margin: 0; padding-left: 20px; color: #404e65; line-height: 1.6;">
                ${listHtml}
            </ul>
        </div>
    </details>
</div>`;
            }
        },
        gridH4: {
            name: "CSS Grid Cards (<h4> variation)",
            fields: [
                { id: "c1Title", label: "Card 1 Title", default: "Step 1: Preparation", type: "input" },
                { id: "c1Intro", label: "Card 1 Intro", default: "Follow these steps:", type: "textarea" },
                { id: "c1List", label: "Card 1 List (One item per line)", default: "Gather tools\nReview manual\nStart engine", type: "list" },
                { id: "c2Title", label: "Card 2 Title", default: "Tools Required", type: "input" },
                { id: "c2Intro", label: "Card 2 Intro", default: "Ensure you have:", type: "textarea" },
                { id: "c2List", label: "Card 2 List (One item per line)", default: "Wrench\nScrewdriver\nGloves", type: "list" }
            ],
            render: (d) => buildGrid(d, "h4", "ol", "ul")
        },
        gridH3: {
            name: "CSS Grid Cards (<h3> variation)",
            fields: [
                { id: "c1Title", label: "Card 1 Title", default: "Phase 1", type: "input" },
                { id: "c1Intro", label: "Card 1 Intro", default: "Objectives:", type: "textarea" },
                { id: "c1List", label: "Card 1 List (One item per line)", default: "Research\nDesign\nBuild", type: "list" },
                { id: "c2Title", label: "Card 2 Title", default: "Resources", type: "input" },
                { id: "c2Intro", label: "Card 2 Intro", default: "Available items:", type: "textarea" },
                { id: "c2List", label: "Card 2 List (One item per line)", default: "Servers\nDomains\nCodebase", type: "list" }
            ],
            render: (d) => buildGrid(d, "h3", "ol", "ul")
        },
        flexCards: {
            name: "Flexbox List Cards (3 Cards)",
            fields: [
                { id: "c1Title", label: "Card 1 Title", default: "Feature One", type: "input" },
                { id: "c1Desc", label: "Card 1 Description", default: "Description of the first feature.", type: "textarea" },
                { id: "c2Title", label: "Card 2 Title", default: "Feature Two", type: "input" },
                { id: "c2Desc", label: "Card 2 Description", default: "Description of the second feature.", type: "textarea" },
                { id: "c3Title", label: "Card 3 Title", default: "Feature Three", type: "input" },
                { id: "c3Desc", label: "Card 3 Description", default: "Description of the third feature.", type: "textarea" }
            ],
            render: (d) => `<ul style="display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin: 1.5em 0; padding: 0; list-style: none;">
    <li style="flex: 0 1 260px; border: 1px solid rgba(0, 159, 194, 0.2); border-radius: 8px; padding: 1.5em; background-color: rgba(0, 159, 194, 0.08);">
        <p style="margin: 0 0 0.5em; text-align: center; color: #027299; font-size: 1.15em;"><strong>${d.c1Title}</strong></p>
        <p style="text-align: center; margin: 0; line-height: 1.5; color: #404e65;">${d.c1Desc}</p>
    </li>
    <li style="flex: 0 1 260px; border: 1px solid rgba(0, 159, 194, 0.2); border-radius: 8px; padding: 1.5em; background-color: rgba(0, 159, 194, 0.08);">
        <p style="margin: 0 0 0.5em; text-align: center; color: #027299; font-size: 1.15em;"><strong>${d.c2Title}</strong></p>
        <p style="text-align: center; margin: 0; line-height: 1.5; color: #404e65;">${d.c2Desc}</p>
    </li>
    <li style="flex: 0 1 260px; border: 1px solid rgba(0, 159, 194, 0.2); border-radius: 8px; padding: 1.5em; background-color: rgba(0, 159, 194, 0.08);">
        <p style="margin: 0 0 0.5em; text-align: center; color: #027299; font-size: 1.15em;"><strong>${d.c3Title}</strong></p>
        <p style="text-align: center; margin: 0; line-height: 1.5; color: #404e65;">${d.c3Desc}</p>
    </li>
</ul>`
        }
    };

    function buildGrid(d, headingTag, listTag1, listTag2) {
        const c1Items = d.c1List.split('\n').map(i => i.trim()).filter(i => i);
        const c2Items = d.c2List.split('\n').map(i => i.trim()).filter(i => i);
        
        const mapList = (items) => items.map((item, idx) => 
            `<li style="color: #404e65; ${idx === items.length - 1 ? 'margin-bottom: 0;' : 'margin-bottom: 12px;'}">${item}</li>`
        ).join('\n                ');

        return `<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin: 1.5em 0; align-items: stretch;">
    <div style="display: flex; flex-direction: column; border: 1px solid rgba(64, 78, 101, 0.15); border-top: 5px solid #009fc2; border-radius: 8px; background: #ffffff;">
        <div style="padding: 1.5em 1.5em 1em 1.5em; border-bottom: 1px solid rgba(64, 78, 101, 0.15);">
            <${headingTag} style="margin: 0; color: #027299; font-size: 1.25em;">${d.c1Title}</${headingTag}>
        </div>
        <div style="padding: 1.5em; flex-grow: 1;">
            <p style="color: #404e65; margin-top: 0; margin-bottom: 1em; line-height: 1.6;">${d.c1Intro}</p>
            <${listTag1} style="color: #404e65; margin: 0; padding-left: 24px; line-height: 1.6;">
                ${mapList(c1Items)}
            </${listTag1}>
        </div>
    </div>
    <div style="display: flex; flex-direction: column; border: 1px solid rgba(64, 78, 101, 0.15); border-top: 5px solid #009fc2; border-radius: 8px; background: #ffffff;">
        <div style="padding: 1.5em 1.5em 1em 1.5em; border-bottom: 1px solid rgba(64, 78, 101, 0.15);">
            <${headingTag} style="margin: 0; color: #027299; font-size: 1.25em;">${d.c2Title}</${headingTag}>
        </div>
        <div style="padding: 1.5em; flex-grow: 1;">
            <p style="color: #404e65; margin-top: 0; margin-bottom: 1em; line-height: 1.6;">${d.c2Intro}</p>
            <${listTag2} style="color: #404e65; margin: 0; padding-left: 24px; line-height: 1.6;">
                ${mapList(c2Items)}
            </${listTag2}>
        </div>
    </div>
</div>`;
    }

    const selectEl = document.getElementById('block-type');
    const inputsEl = document.getElementById('dynamic-inputs');
    const previewEl = document.getElementById('preview');
    const codeOutputEl = document.getElementById('code-output');
    const btnCopy = document.getElementById('copy-btn');

    // Populate Select Dropdown
    for (const key in templates) {
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = templates[key].name;
        selectEl.appendChild(opt);
    }

    // Render Form Inputs based on Selection
    function renderInputs() {
        const key = selectEl.value;
        const config = templates[key];
        inputsEl.innerHTML = '';
        
        config.fields.forEach(field => {
            const wrap = document.createElement('div');
            wrap.className = 'form-group';
            
            let inputHtml = '';
            if (field.type === 'textarea') {
                inputHtml = `<textarea id="input-${field.id}">${field.default}</textarea>`;
            } else if (field.type === 'list') {
                inputHtml = `<textarea id="input-${field.id}" class="list-input" placeholder="Enter items here, one per line">${field.default}</textarea>`;
            } else {
                inputHtml = `<input type="text" id="input-${field.id}" value="${field.default}" />`;
            }

            wrap.innerHTML = `
                <label for="input-${field.id}">${field.label}</label>
                ${inputHtml}
            `;
            inputsEl.appendChild(wrap);
        });
    }

    // Generate HTML Output
    function generateOutput() {
        const key = selectEl.value;
        const config = templates[key];
        const data = {};
        config.fields.forEach(f => {
            data[f.id] = document.getElementById(`input-${f.id}`).value;
        });
        
        const html = config.render(data);
        previewEl.innerHTML = html;
        codeOutputEl.value = html;
    }

    // Smart Paste Interceptor for Rich Text
    document.addEventListener('paste', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
            const html = e.clipboardData.getData('text/html');
            if (html) {
                e.preventDefault();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                
                function extractRichText(node) {
                    if (node.nodeType === 3) return node.textContent; // Text node
                    if (node.nodeType === 1) {
                        const tag = node.tagName.toLowerCase();
                        let inner = '';
                        for (let child of node.childNodes) inner += extractRichText(child);
                        
                        if (tag === 'a') {
                            const href = node.getAttribute('href');
                            if (href && !href.toLowerCase().startsWith('javascript:')) {
                                return `<a href="${href}">${inner}</a>`;
                            }
                        }
                        if (tag === 'b' || tag === 'strong') return `<strong>${inner}</strong>`;
                        if (tag === 'i' || tag === 'em') return `<em>${inner}</em>`;
                        
                        // Handle block elements to ensure spacing is preserved
                        if (['p', 'div', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6'].includes(tag)) return inner + '\\n\\n';
                        if (tag === 'br' || tag === 'li') return inner + '\\n';
                        
                        return inner;
                    }
                    return '';
                }
                
                let cleanCode = extractRichText(doc.body).replace(/\\n\\s*\\n/g, '\\n\\n').trim();
                
                // Fallback to plain text if HTML was completely stripped of readable content
                if (!cleanCode) {
                    cleanCode = e.clipboardData.getData('text/plain');
                }
                
                // Safely insert the converted HTML tags at the cursor position
                document.execCommand('insertText', false, cleanCode);
                generateOutput();
            }
        }
    });

    // Event Listeners
    selectEl.addEventListener('change', () => {
        renderInputs();
        generateOutput();
    });
    
    inputsEl.addEventListener('input', generateOutput); // Live preview!
    
    btnCopy.addEventListener('click', () => {
        codeOutputEl.select();
        document.execCommand('copy');
        const originalText = btnCopy.textContent;
        btnCopy.textContent = "Copied!";
        setTimeout(() => btnCopy.textContent = originalText, 2000);
    });

    // Init
    renderInputs();
    generateOutput();

</script>
</body>
</html>
